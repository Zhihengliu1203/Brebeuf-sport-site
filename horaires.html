<!doctype html>
<html lang="fr-CA">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consulter les horaires — Plateforme Sport</title>
  <meta name="description" content="Horaires et tarifs des terrains sportifs (Bois-de-Boulogne, Claude-Robillard, arénas, parcs, centres de loisirs)." />

  <style>
  
    :root{
      --bg:#0b0f17;
      --card:#101827;
      --text:#e7eefc;
      --muted:#b7c4dd;
      --line:#22304a;
      --accent:#6aa9ff;
      --accent2:#7cffc7;
      --radius:18px;
      --shadow: 0 12px 30px rgba(0,0,0,.35);
      --max: 1100px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(106,169,255,.22), transparent 55%),
                  radial-gradient(900px 500px at 90% 10%, rgba(124,255,199,.16), transparent 55%),
                  var(--bg);
      color: var(--text);
      line-height:1.5;
    }
    a{ color:inherit; text-decoration:none; }
    .wrap{ max-width: var(--max); margin: 0 auto; padding: 22px; }
    header{
      position: sticky; top: 0;
      backdrop-filter: blur(10px);
      background: rgba(11,15,23,.55);
      border-bottom: 1px solid rgba(34,48,74,.6);
      z-index: 20;
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      gap: 16px;
    }
    .brand{ display:flex; align-items:center; gap:10px; font-weight:700; }
    .dot{
      width:12px; height:12px; border-radius:999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 4px rgba(106,169,255,.12);
    }
    nav{ display:flex; gap:10px; flex-wrap:wrap; color: var(--muted); font-size: 14px; }
    nav a{ padding:8px 10px; border-radius:999px; }
    nav a:hover{ background: rgba(255,255,255,.06); color: var(--text); }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 10px 14px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      gap:10px; font-weight: 650;
    }
    .btn.primary{
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#07101c;
      box-shadow: 0 14px 26px rgba(106,169,255,.18);
    }
    .btn:hover{ transform: translateY(-1px); transition: .15s ease; background: rgba(255,255,255,.09); }

    .card{
      background: rgba(16,24,39,.78);
      border: 1px solid rgba(34,48,74,.85);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .top{
      padding: 18px;
      display:flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    h1{ margin:0; font-size: 26px; }
    .sub{ margin-top:6px; color: var(--muted); font-size: 14px; max-width: 70ch; }

    .toolbar{
      padding: 14px 18px 18px;
      border-top: 1px solid rgba(34,48,74,.65);
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .input{
      flex: 1 1 280px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline: none;
    }
    .hint{ color: var(--muted); font-size: 13px; }

    .grid{ display:grid; grid-template-columns: 1fr; gap: 14px; margin-top: 14px; }
    .section{ padding: 16px 18px; }
    h2{ margin: 0 0 10px; font-size: 18px; }
    .meta{ color: var(--muted); font-size: 13px; margin: 0 0 12px; }

    table{ width:100%; border-collapse: collapse; overflow:hidden; border-radius: 12px; }
    th, td{
      text-align:left;
      padding: 10px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      vertical-align: top;
      font-size: 14px;
    }
    th{ color: var(--muted); font-weight: 650; background: rgba(255,255,255,.04); }
    tr:hover td{ background: rgba(255,255,255,.03); }

    .link{
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .badge{
      display:inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      margin-right: 6px;
    }

    footer{
      margin-top: 18px;
      padding: 18px 0 34px;
      border-top: 1px solid rgba(34,48,74,.65);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 920px){
      nav{ display:none; }
      th, td{ font-size: 13px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap nav">
      <div class="brand">
        <div class="dot"></div>
        <div>Plateforme Sport • Brébeuf</div>
      </div>
      <nav>
        <a href="index.html">Accueil</a>
      </nav>
      <a class="btn" href="index.html">← Retour</a>
    </div>
  </header>

  <main class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <h1>Consulter les horaires</h1>
          <div class="sub">Tous les terrains / sports / tarifs (avec liens sources). Filtre en tapant “tennis”, “Bois-de-Boulogne”, “aréna”, “badminton”, etc.</div>
        </div>
        <a class="btn primary" href="index.html#contact">Rejoindre la liste d’attente</a>
      </div>

      <div class="toolbar">
        <input id="q" class="input" type="text" placeholder="Filtrer (ex. tennis, rM, Bois-de-Boulogne, patinage...)" />
        <div class="hint">
          <span class="badge">rM</span> Résident Montréal
          <span class="badge">nrM</span> Non-résident
        </div>
      </div>
    </div>

    <div id="content" class="grid"></div>

   
  </main>

  <script>
    const data = [
      {
        location: "Bois-de-Boulogne",
        rows: [
          { terrain: "Gym simple", sport: "Multi", tarif: "60–62.70 $/h", source: "https://complexesportif.bdeb.qc.ca/plateaux-sportifs-interieurs#:~:text=*%20177.65%20$/heure%20(tarif%20du%201er%20juillet,du%201er%20mai%20au%2030%20juin%202024)", précisions: "" },
          { terrain: "Gym double", sport: "Multi", tarif: "120–125.40 $/h", source: "", précisions: "" },
          { terrain: "Multifonctionnel", sport: "Multi", tarif: "48–50.16 $/h", source: "", précisions: "" },
        ]
      },
      {
        location: "Complexe sportif Claude-Robillard",
        rows: [
          { terrain: "Gymnase double", sport: "Badminton", tarif: "15.50 (rM) • 27 (nrM)", source: "https://montreal.ca/lieux/gymnase-double-du-complexe-sportif-claude-robillard", précisions: "" },
          { terrain: "Terrains de tennis ext.", sport: "Tennis ext.", tarif: "9.50–14.50 ", source: "https://montreal.ca/lieux/terrains-de-tennis-exterieurs-du-complexe-sportif-claude-robillard", précisions: "" },
          { terrain: "Terrains de tennis int.", sport: "Tennis int.", tarif: "14.50–24.50 (rM) • 25–45 (nrM)", source: "https://montreal.ca/lieux/terrains-de-tennis-interieurs-du-complexe-sportif-claude-robillard", précisions: "" },
          { terrain: "Piste de course (ext.)", sport: "Jogging", tarif: "15.50 (rM) • 27 (nrM)", source: "https://montreal.ca/lieux/piste-de-course-exterieure-du-complexe-sportif-claude-robillard", précisions: "" },
          { terrain: "Salle omnisports", sport: "Multidisciplinaire", tarif: "15.50 (rM) • 27 (nrM)", source: "https://montreal.ca/lieux/salle-omnisports-du-complexe-sportif-claude-robillard", précisions: "" },
        ]
      },
      {
        location: "Aréna Michel-Normandin",
        rows: [
          { terrain: "Aréna", sport: "Patinage", tarif: "—", source: "https://montreal.ca/lieux/arena-michel-normandin", précisions: "" },
        ]
      },
      {
        location: "Aréna Bill-Durnan",
        rows: [
          { terrain: "Patinoire", sport: "Patin libre", tarif: "3.50 (rM) • 5.80 (nrM)", source: "https://montreal.ca/lieux/arena-bill-durnan", précisions: "Dispo ven, sam, dim" },
          { terrain: "Patinoire", sport: "Hockey libre", tarif: "6.80 (rM) • 10.00 (nrM)", source: "https://montreal.ca/lieux/arena-bill-durnan", précisions: "Gratuit vendredi (selon dispo)" },
        ]
      },
      {
        location: "Parc Martin-Luther-King",
        rows: [
          { terrain: "Terrains ext.", sport: "Tennis / Pickleball", tarif: "1.80–15.80 (rM) • 2.70–16.30 (nrM) / pers (1h)", source: "https://montreal.ca/lieux/terrains-de-tennis-et-de-pickleball-du-parc-martin-luther-king", précisions: "Gratuit à certaines périodes" },
        ]
      },
      {
        location: "Parc Warren-Allmand",
        rows: [
          { terrain: "Terrains ext.", sport: "Tennis / Pickleball", tarif: "1.80–15.80 (rM) • 2.70–16.30 (nrM) / pers (1h)", source: "https://montreal.ca/lieux/terrains-de-tennis-et-de-pickleball-du-parc-martin-luther-king", précisions: "Gratuit à certaines périodes" },
        ]
      },
      {
        location: "Centre de loisirs Saint-Denis",
        rows: [
          { terrain: "Gymnase", sport: "Multi", tarif: "60 $ (location)", source: "https://montreal.ca/lieux/centre-de-loisirs-saint-denis", précisions: "" },
          { terrain: "Salles multi", sport: "Multi", tarif: "25–30 $ (location)", source: "", précisions: "" },
        ]
      },
      {
        location: "Aréna Mont-Royal",
        rows: [
          { terrain: "Patinoire", sport: "Hockey / patinage / bâton-rondelle", tarif: "180–264 $ (location privée)", source: "https://montreal.ca/lieux/arena-mont-royal", précisions: "" },
        ]
      }
    ];

    const content = document.getElementById("content");
    const input = document.getElementById("q");

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function render(filterText=""){
      const f = filterText.trim().toLowerCase();
      content.innerHTML = "";

      const blocks = [];

      for(const section of data){
        const filteredRows = section.rows.filter(r => {
          const blob = `${section.location} ${r.terrain} ${r.sport} ${r.tarif} ${r.source} ${r.précisions}`.toLowerCase();
          return !f || blob.includes(f);
        });

        if(filteredRows.length === 0) continue;

        const rowsHtml = filteredRows.map(r => {
          const src = r.source
            ? `<a class="link" href="${escapeHtml(r.source)}" target="_blank" rel="noopener">Lien</a>`
            : `<span style="color:rgba(183,196,221,.7)">—</span>`;

          return `
            <tr>
              <td>${escapeHtml(r.terrain)}</td>
              <td>${escapeHtml(r.sport)}</td>
              <td>${escapeHtml(r.tarif)}</td>
              <td>${src}</td>
              <td>${escapeHtml(r.précisions || "—")}</td>
            </tr>
          `;
        }).join("");

        blocks.push(`
          <div class="card section">
            <h2>${escapeHtml(section.location)}</h2>
            <table>
              <thead>
                <tr>
                  <th>Terrain</th>
                  <th>Sport</th>
                  <th>Tarif</th>
                  <th>Source</th>
                  <th>Précisions</th>
                </tr>
              </thead>
              <tbody>${rowsHtml}</tbody>
            </table>
          </div>
        `);
      }

      content.innerHTML = blocks.length
        ? blocks.join("")
        : `<div class="card section"><h2>Aucun résultat</h2><p class="meta">Essaie un autre mot-clé (ex. “tennis”, “aréna”, “Bois-de-Boulogne”).</p></div>`;
    }

    input.addEventListener("input", (e) => render(e.target.value));
    render();
  </script>
</body>
</html>
